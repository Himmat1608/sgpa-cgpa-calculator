<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GradeSphere – Universal GPA Calculator{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#4F46E5',  /* Indigo-600 */
                        secondary: '#10B981', /* Emerald-500 */
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- html2pdf for PDF Exports -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body
    class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-900 dark:text-gray-100 min-h-screen flex flex-col font-sans">

    <!-- Navbar -->
    <nav class="glass-nav sticky top-0 z-50 px-4 md:px-8 py-4 flex justify-between items-center shadow-sm">
        <a href="{{ url_for('index') }}"
            class="flex items-center gap-2 text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-purple-500 transition-transformation hover:scale-105">
            <i class="fa-solid fa-graduation-cap text-primary drop-shadow-sm"></i> GradeSphere
        </a>
        <div class="flex items-center gap-4 md:gap-6">
            <a href="{{ url_for('sgpa') }}" class="hover:text-primary transition-colors font-medium">SGPA</a>
            <a href="{{ url_for('cgpa') }}" class="hover:text-primary transition-colors font-medium">CGPA</a>
            <button id="theme-toggle"
                class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors focus:outline-none focus:ring-2 focus:ring-primary">
                <i id="theme-toggle-icon" class="fa-solid fa-moon"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8 max-w-5xl">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer
        class="py-8 text-center text-sm text-gray-500 dark:text-gray-400 mt-auto border-t border-gray-200 dark:border-gray-800">
        <p class="font-medium">GradeSphere &copy; 2024</p>
        <p class="mt-1 font-light italic text-xs tracking-wider uppercase">Precision in Every Credit.</p>
    </footer>

    <!-- Toast Notification Area -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-[200] flex flex-col gap-2 pointer-events-none"></div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
